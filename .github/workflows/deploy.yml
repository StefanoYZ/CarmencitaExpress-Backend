name: Test and Deploy Backend

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  test:
    name: Pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar pruebas unitarias
        run: python -m pytest -q

  deploy:
    name: Deploy al Droplet
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Actualizar .env y reconstruir solo "backend"
        uses: appleboy/ssh-action@v1
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          envs: ENV_FILE
          script: |
            set -euo pipefail
            echo "$ENV_FILE" > /opt/carmencita/deploy/.env

            # Clon dedicado a CI: siempre se alinea con origin/main, sin merges.
            cd /opt/carmencita/CarmencitaExpress-Backend
            git fetch origin main
            git reset --hard origin/main

            cd /opt/carmencita/deploy
            docker compose up --build -d --remove-orphans backend
            docker image prune -f
