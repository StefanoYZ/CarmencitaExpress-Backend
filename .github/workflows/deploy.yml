name: Test and Deploy Backend

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  test:
    name: Pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar pruebas unitarias
        run: python -m pytest -q

  deploy:
    name: Deploy al Droplet
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Actualizar .env y reconstruir solo "backend"
        uses: appleboy/ssh-action@v1
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          envs: ENV_FILE
          script: |
            set -euo pipefail

            # Fusiona ENV_FILE con el .env existente en vez de sobreescribirlo
            # entero: cualquier clave que NO venga en el secret (p. ej.
            # LYCET_LOGO_BASE64, omitida por el limite de tamano de GitHub
            # Secrets) se conserva tal cual esta en el Droplet.
            python3 - /opt/carmencita/deploy/.env <<'PYEOF'
            import os, sys
            path = sys.argv[1]
            new_content = os.environ["ENV_FILE"]
            current, order = {}, []
            if os.path.exists(path):
                with open(path) as f:
                    for line in f:
                        stripped = line.rstrip("\n")
                        if not stripped or stripped.startswith("#") or "=" not in stripped:
                            continue
                        key, _, value = stripped.partition("=")
                        current[key] = value
                        order.append(key)
            for line in new_content.splitlines():
                stripped = line.strip()
                if not stripped or stripped.startswith("#") or "=" not in stripped:
                    continue
                key, _, value = stripped.partition("=")
                if key not in current:
                    order.append(key)
                current[key] = value
            with open(path, "w") as f:
                for key in order:
                    f.write(f"{key}={current[key]}\n")
            PYEOF

            # Clon dedicado a CI: siempre se alinea con origin/main, sin merges.
            cd /opt/carmencita/CarmencitaExpress-Backend
            git fetch origin main
            git reset --hard origin/main

            cd /opt/carmencita/deploy
            docker compose up --build -d --remove-orphans backend
            docker image prune -f
